services:
  postgres:
    image: postgres:16-alpine
    container_name: flowpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flowpilot}
      POSTGRES_USER: ${POSTGRES_USER:-flowpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowpilot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: flowpilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
    container_name: flowpilot-backend
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ../backend
    container_name: flowpilot-worker
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ../backend:/app
    command: celery -A app.worker.celery_app worker --loglevel=info

  beat:
    build:
      context: ../backend
    container_name: flowpilot-beat
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - redis
      - worker
      - backend
    volumes:
      - ../backend:/app
    command: celery -A app.worker.celery_app beat --loglevel=info

  frontend:
    build:
      context: ../frontend
    container_name: flowpilot-frontend
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
