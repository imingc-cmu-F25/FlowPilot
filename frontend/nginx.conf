server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path returns index.html so react-router can
    # take over client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # These are proxied by Caddy directly to the backend; if they ever reach
    # nginx it means routing is misconfigured, so surface a clear error.
    location /api/   { return 404; }
    location /hooks/ { return 404; }

    # Light caching for hashed build assets (Vite emits content-hashed names).
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
